<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tic-Tac-Toe Pro | AI & PvP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>  Tic-Tac-Toe</h1>
        <div class="controls">
            <div class="control-group">
                <label>Mode</label>
                <select id="gameMode" onchange="resetGame()">
                    <option value="ai">vs AI</option>
                    <option value="pvp">1 vs 1</option>
                </select>
            </div>
            <div class="control-group" id="difficultyGroup">
                <label>Difficulty</label>
                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard (Minimax)</option>
                </select>
            </div>
        </div>
        <div id="board"></div>
        <p id="status"></p>
        <button class="reset-btn" onclick="resetGame()">Restart Game</button>
    </div>
    <div id="celebration" class="hidden" onclick="closeCelebration()"></div>
    <script src="script.js"></script>
</body>
</html>
